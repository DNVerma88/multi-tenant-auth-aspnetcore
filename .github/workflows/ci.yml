name: CI

on:
  push:
    branches: [ "main", "release/**" ]
  pull_request:
    branches: [ "main", "release/**" ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Each job tests one TFM of the library against the matching runtime.
        # Both SDKs are always installed because the library targets net8.0;net10.0
        # and the .NET 8 SDK alone cannot build the net10.0 TFM.
        dotnet-version: [ "8.0.x", "10.0.x" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SourceLink

      - name: Setup .NET (8 + 10)
        # Both SDKs required to build net8.0 and net10.0 TFMs.
        # The matrix controls which runtime the tests execute against.
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test (.NET ${{ matrix.dotnet-version }})
        # Run tests compiled for the TFM matching this matrix job.
        # net8.0 tests run under .NET 8 runtime; net10.0 tests under .NET 10 runtime.
        run: |
          TFM="${{ matrix.dotnet-version == '8.0.x' && 'net8.0' || 'net10.0' }}"
          dotnet test --no-build -c Release \
            --framework "$TFM" \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.dotnet-version }}
          path: "**/*.trx"

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (8 + 10)
        # Both SDKs required to restore all TFMs and scan transitive packages
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Check for vulnerable packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::error::Vulnerable packages detected. See vuln-report.txt for details."
            exit 1
          fi

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: vuln-report.txt
