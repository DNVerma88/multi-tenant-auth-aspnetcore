name: CD

# Triggered automatically on semver tag pushes (e.g. v1.1.0)
# or manually via "Run workflow" with an explicit version input.
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version — semver without the 'v' prefix (e.g. 1.1.0)"
        required: true
        type: string

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: write        # Create GitHub Release, push git tag
  id-token: write        # Request OIDC JWT for NuGet trusted publishing

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    environment:
      name: nuget-publish   # GitHub Environment — use for required reviewers / approval gate

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for SourceLink

      - name: Setup .NET (8 + 10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip the leading 'v' from the pushed tag (e.g. v1.1.0 → 1.1.0)
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Delete existing tag if it already exists so re-runs are idempotent
          git tag -d "${{ steps.version.outputs.tag }}" 2>/dev/null || true
          git push origin --delete "${{ steps.version.outputs.tag }}" 2>/dev/null || true
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Vulnerability scan
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::error::Vulnerable packages detected — aborting publish."
            exit 1
          fi

      - name: Pack
        run: |
          dotnet pack src/MultiTenantAuth.AspNetCore/MultiTenantAuth.AspNetCore.csproj \
            --no-restore -c Release -o ./artifacts \
            -p:Version=${{ steps.version.outputs.value }}

      # ── NuGet Trusted Publishing (OIDC) ───────────────────────
      # Configure a "GitHub Actions" trusted publisher on nuget.org first:
      #   https://www.nuget.org/account/packages → Manage → Trusted publishers
      # Set: owner=deepn87, repo=multi-tenant-auth-aspnetcore,
      #      workflow=cd.yml, environment=nuget-publish
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: deepn87

      - name: Push packages to NuGet.org
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
          if ls ./artifacts/*.snupkg 1>/dev/null 2>&1; then
            dotnet nuget push "./artifacts/*.snupkg" \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          body: |
            ## Installation

            ```
            dotnet add package MultiTenantAuth.AspNetCore
            ```

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's new.
